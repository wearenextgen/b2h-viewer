<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magnesium Viewer</title>
  <style>
    :root {
      --accent: #b69ce8;
      --accent-soft: rgba(182, 156, 232, 0.28);
      --ink: rgba(78, 61, 126, 0.84);
      --bg-a: #fffefe;
      --bg-b: #f2eeff;
    }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.96), transparent 28%),
        radial-gradient(circle at 84% 10%, rgba(182,156,232,0.22), transparent 32%),
        linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 100%);
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
    #wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(244,239,255,0.9));
      z-index: 5;
      transition: opacity 0.35s ease;
    }
    .loading.is-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-card {
      width: min(72vw, 280px);
      text-align: center;
    }
    .loading-label {
      margin: 0 0 12px;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .loading-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      box-shadow: inset 0 0 0 1px rgba(110, 90, 160, 0.08);
      overflow: hidden;
    }
    .loading-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #d4c0f5);
      transition: width 0.2s ease;
    }
    .hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 14px 34px rgba(104, 87, 144, 0.12);
      backdrop-filter: blur(10px);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
      z-index: 2;
      white-space: nowrap;
    }
  </style>
  <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="wrap">
    <div class="loading" id="loading">
      <div class="loading-card">
        <p class="loading-label">Loading 3D Viewer</p>
        <div class="loading-bar">
          <div class="loading-fill" id="loading-fill"></div>
        </div>
      </div>
    </div>
    <div class="hint">drag to rotate</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const MODEL_URL = 'https://wearenextgen.github.io/b2h-viewer/magnesium_final.glb';
    const LABEL_URL = 'https://wearenextgen.github.io/b2h-viewer/magnesium-label.png';

    const wrap = document.getElementById('wrap');
    const loading = document.getElementById('loading');
    const loadingFill = document.getElementById('loading-fill');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    wrap.prepend(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(34, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
    camera.position.set(0, 0.1, 5.4);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.enableZoom = false;
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    controls.minPolarAngle = Math.PI / 2 - 0.45;
    controls.maxPolarAngle = Math.PI / 2 + 0.45;

    scene.add(new THREE.AmbientLight(0xffffff, 1.8));

    const key = new THREE.DirectionalLight(0xffffff, 2.35);
    key.position.set(3.2, 4.6, 5.5);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xf0ebff, 1.55);
    fill.position.set(-4.5, 1.6, 3.2);
    scene.add(fill);

    const rim = new THREE.PointLight(0xceb8ff, 18, 20, 2);
    rim.position.set(0, 1.7, 2.8);
    scene.add(rim);

    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(1.72, 1.86, 0.2, 80),
      new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        roughness: 0.16,
        metalness: 0.02,
        transmission: 0.12,
        transparent: true,
        opacity: 0.92,
        clearcoat: 1
      })
    );
    pedestal.position.set(0, -2.02, 0);
    scene.add(pedestal);

    const shadow = new THREE.Mesh(
      new THREE.CircleGeometry(1.95, 80),
      new THREE.MeshBasicMaterial({ color: 0xd6cdf0, transparent: true, opacity: 0.22 })
    );
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.set(0, -2.11, 0);
    scene.add(shadow);

    const bottleMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xf4f2f7,
      roughness: 0.46,
      metalness: 0.0,
      clearcoat: 0.5,
      clearcoatRoughness: 0.22
    });

    const textureLoader = new THREE.TextureLoader();
    const labelTexture = textureLoader.load(LABEL_URL);
    labelTexture.colorSpace = THREE.SRGBColorSpace;
    labelTexture.wrapS = THREE.ClampToEdgeWrapping;
    labelTexture.wrapT = THREE.ClampToEdgeWrapping;
    labelTexture.flipY = false;
    labelTexture.center.set(0.5, 0.5);
    labelTexture.rotation = Math.PI;

    const group = new THREE.Group();
    scene.add(group);

    new GLTFLoader().load(
      MODEL_URL,
      (gltf) => {
        const model = gltf.scene;

        model.traverse((child) => {
          if (!child.isMesh) return;
          child.material = bottleMaterial;
          child.castShadow = false;
          child.receiveShadow = false;
        });

        const localBox = new THREE.Box3().setFromObject(model);
        const center = localBox.getCenter(new THREE.Vector3());
        const size = localBox.getSize(new THREE.Vector3());
        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const fitHeight = size.y * 0.5;
        camera.position.set(maxDim * 0.04, fitHeight * 0.04, maxDim * 3.45);
        camera.lookAt(0, fitHeight * 0.03, 0);
        controls.target.set(0, fitHeight * 0.05, 0);
        controls.update();

        group.add(model);

        const worldBox = new THREE.Box3().setFromObject(model);
        const worldSize = worldBox.getSize(new THREE.Vector3());

        const yMin = worldBox.min.y + worldSize.y * 0.07;
        const yMax = worldBox.min.y + worldSize.y * 0.7;
        const labelHeight = yMax - yMin;
        const labelCenterY = (yMin + yMax) / 2;
        const radius = Math.max(worldSize.x, worldSize.z) / 2 * 1.018;

        const label = new THREE.Mesh(
          new THREE.CylinderGeometry(radius, radius, labelHeight, 128, 1, true),
          new THREE.MeshStandardMaterial({
            map: labelTexture,
            transparent: true,
            roughness: 0.3,
            metalness: 0.0,
            side: THREE.FrontSide
          })
        );
        label.position.set(0, labelCenterY, 0);
        label.rotation.y = Math.PI / 2;
        group.add(label);

        loading.classList.add('is-hidden');
      },
      (event) => {
        if (!event.total) return;
        loadingFill.style.width = `${(event.loaded / event.total) * 100}%`;
      },
      () => {
        loading.classList.add('is-hidden');
      }
    );

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      group.position.y = Math.sin(t * 1.15) * 0.045;
      group.rotation.z = Math.sin(t * 0.55) * 0.018;
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = wrap.clientWidth / wrap.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    });
  </script>
</body>
</html>
